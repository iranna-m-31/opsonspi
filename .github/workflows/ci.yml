name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Publish libraries to mavenLocal
        run: ./gradlew -PpublishOnly=true publishLibrariesToMavenLocal
      - name: Plugin unit and functional tests
        run: ./gradlew :jsonapi-openapi-gradle-plugin:test
      - name: Starter tests
        run: ./gradlew :jsonapi-openapi-spring-boot-starter:test
