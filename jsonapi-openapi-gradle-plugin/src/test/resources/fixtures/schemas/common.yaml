$schema: https://json-schema.org/draft/2020-12/schema
$id: https://jsonapi.openapi.spring/schemas/common.yaml

$defs:
  error-object:
    type: object
    properties:
      id: { type: string }
      status: { type: string }
      code: { type: string }
      title: { type: string }
      detail: { type: string }
      source:
        type: object
        properties:
          pointer: { type: string }
          parameter: { type: string }

  meta-object:
    type: object
    additionalProperties: true
    properties:
      totalCount: { type: integer }
      pageSize: { type: integer }
      currentPage: { type: integer }
      totalPages: { type: integer }

  resource-linkage:
    type: object
    required: [type, id]
    properties:
      type: { type: string }
      id: { type: string }
      lid: { type: string }

  relationship-data:
    oneOf:
      - $ref: '#/$defs/resource-linkage'
      - type: array
        items:
          $ref: '#/$defs/resource-linkage'
      - type: "null"

  OpStringSet:
    type: string
    enum: ['=', '!=', '<', '>', '<=', '>=', in, 'not in']

  FilterRule:
    type: object
    required: [field, operator, value]
    properties:
      field: { type: string }
      operator:
        $ref: '#/$defs/OpStringSet'
      value: {}

  LogicalCombinator:
    type: string
    enum: [and, or]

  FilterExpression:
    type: object
    additionalProperties: false
    properties:
      not:
        type: boolean
        default: false
      rules:
        type: array
        minItems: 1
        items:
          oneOf:
            - $ref: '#/$defs/LogicalCombinator'
            - $ref: '#/$defs/FilterRule'

  jsonapi-request-document:
    type: object
    properties:
      data:
        oneOf:
          - type: object
          - type: array
          - type: "null"
      included:
        type: array
        items:
          type: object
      meta:
        $ref: '#/$defs/meta-object'

  jsonapi-response-document:
    type: object
    properties:
      data:
        oneOf:
          - type: object
          - type: array
          - type: "null"
      included:
        type: array
        items:
          type: object
      meta:
        $ref: '#/$defs/meta-object'
      links:
        type: object
      errors:
        type: array
        items:
          $ref: '#/$defs/error-object'
