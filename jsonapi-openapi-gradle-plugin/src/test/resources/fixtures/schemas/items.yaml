$schema: https://json-schema.org/draft/2020-12/schema
$id: https://jsonapi.openapi.spring/schemas/items.yaml
title: Item
type: object
x-entity: Item
x-resource-type: items
properties:
  '@id':
    type: string
    x-field: /Item/id
  title:
    type: string
    x-field: /Item/title
  code:
    type: string
    x-field: /Item/code
  quantity:
    type: integer
    x-field: /Item/quantity

dependentSchemas:
  $:
    anyOf:
      - $ref: '#/$defs/add-request'
        x-service: itemService.create
      - $ref: '#/$defs/find-request'
        x-service: itemService.findAll
      - $ref: '#/$defs/find-by-id-request'
        x-service: itemService.findById
      - $ref: '#/$defs/update-request'
        x-service: itemService.update
      - $ref: '#/$defs/remove-request'
        x-service: itemService.delete

$defs:
  add-request:
    type: object
    required: [title]
    properties:
      title: { type: string }
      code: { type: string }
      quantity: { type: integer }
  find-request:
    type: object
  find-by-id-request:
    type: object
    required: ['@id']
    properties:
      '@id': { type: string }
  update-request:
    type: object
    properties:
      title: { type: string }
  remove-request:
    type: object
    required: ['@id']
  add-response: {}
  find-response: {}
  find-by-id-response: {}
  update-response: {}
  remove-response: {}
