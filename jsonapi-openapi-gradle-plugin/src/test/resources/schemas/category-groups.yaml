$schema: https://json-schema.org/draft/2020-12/schema
$id: https://jsonapi.openapi.spring/schemas/category-groups.yaml
title: CategoryGroup
type: object
x-entity: CategoryGroup
x-resource-type: categoryGroups
properties:
  '@id':
    type: string
    x-field: /CategoryGroup/id
  name:
    type: string
    x-field: /CategoryGroup/name
  '@members':
    type: array
    items:
      $ref: 'common.yaml#/$defs/resource-linkage'
    x-field: /CategoryGroup/Members/id

dependentSchemas:
  $:
    anyOf:
      - $ref: '#/$defs/find-members-request'
        x-service: categoryGroupService.findMembers

$defs:
  find-members-request:
    type: object
    required: ['@id']
    x-member-entity-schema: schemas/members.yaml
    properties:
      '@id': { type: string }
  find-members-response: {}
  find-request:
    type: object
  find-response: {}
