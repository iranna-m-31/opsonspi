$schema: https://json-schema.org/draft/2020-12/schema
$id: https://jsonapi.openapi.spring/schemas/categories.yaml
title: Category
type: object
x-entity: Category
x-resource-type: categories
properties:
  '@id':
    type: string
    x-field: /Category/id
  name:
    type: string
    x-field: /Category/name
  region:
    type: string
    x-field: /Category/region

dependentSchemas:
  $:
    anyOf:
      - $ref: '#/$defs/add-request'
        x-service: categoryService.create
      - $ref: '#/$defs/find-request'
        x-service: categoryService.findAll
      - $ref: '#/$defs/find-by-id-request'
        x-service: categoryService.findById

$defs:
  add-request:
    type: object
    required: [name]
    properties:
      name: { type: string }
      region: { type: string }
  find-request:
    type: object
  find-by-id-request:
    type: object
    required: ['@id']
  add-response: {}
  find-response: {}
  find-by-id-response: {}
